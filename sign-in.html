<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signin-styles.css">
    <title>Document</title>
</head>
<body>
    <div class="centered-div">
        <div class="sign-in-box">
            <h3>Login Form</h3>
            <table>
               <form action="/Databse/login.php" method="POST">
                    <tr>
                        <td class="td-style">
                            <label for="">Login</label>
                        </td>
                    </tr>
                    <tr>
                        <td class="td-style">
                            <input type="text" name="member_email" id="" placeholder="Enter your Username">
                        </td>
                    </tr>
                    <tr>
                        <td class="td-style">
                            <label for="">Password</label>
                        </td>
                    </tr>
                    <tr>
                        <td class="td-style">
                            <input type="password" name="member_password" id="" placeholder="Enter your Password">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button type="submit" class="sign-in-button">Sign In</button>
                        </td>
                    </tr>
               </form>
            </table>
            
            <a href="sign-up.html">Don't have an account?</a>
        </div>
    </div>
</body>
</html>
